spring.datasource.url=jdbc:postgresql://your-host.neon.tech/dbname?sslmode=require
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# El esquema lo gestiona Flyway; Hibernate solo valida que las entidades coincidan.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Flyway (migraciones versionadas en classpath:db/migration) ---
spring.flyway.enabled=true
spring.flyway.schemas=auth,core
spring.flyway.default-schema=auth

# --- OpenAPI / Swagger UI (estilo /docs de FastAPI) ---
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs